body:
  text: 觀世音菩薩南無佛南無法南無僧佛國有緣佛法相因常樂我淨有緣佛法南無摩訶般若波羅蜜是大神呪南無摩訶般若波羅蜜是大明呪南無摩訶般若波羅蜜是無上呪南無摩訶般若波羅蜜是無等等呪南無淨光祕密佛法藏佛師子吼神足由王佛佛告須彌登王佛法護佛金剛藏師子游戲佛寶勝佛神通佛藥師琉璃光王佛普光功德山王佛善住功德寶王佛過去七佛未來賢劫千佛千五百佛萬五千佛五百花勝佛百億金剛藏佛定光佛六方六佛名號東方寶光月殿月妙尊音王佛南方樹根花王佛西方皂王神通焰花王佛北方月殿清淨佛上方無數精進寶首佛下方善寂月音王佛無量諸佛多寶佛釋迦牟尼佛彌勒佛阿閦佛彌陀佛中央一切衆生在佛世界中者行住於地上及在虛空中慈憂於一切衆生各令安穩休息晝夜修持心常求誦此經能滅生死苦消伏於毒害那摩大明觀世音觀明觀世音高明觀世音開明觀世音藥王菩薩藥上菩薩文殊師利菩薩普賢菩薩虛空藏菩薩地藏菩薩清涼寶山億萬菩薩普光如來化勝菩薩念念誦此偈七佛世尊即說呪曰離波離波帝求訶求訶帝陀羅尼帝尼訶羅帝毗離尼帝摩訶迦帝真靈虔帝娑婆訶十方觀世音一切諸菩薩誓願救衆生稱名悉解脫若有智慧者殷勤為解說但是有因緣讀誦口不綴誦經滿千遍念念心不絶火焰不能傷刀兵立摧折恚怒生歡喜死者變成活莫言此是虛諸佛不妄說佛說高王觀世音經高王觀世音能救諸苦危臨危急難中死者變成活諸佛語不虛是故應頂禮持誦滿千遍重罪皆消滅薄福不信者專貢受持經念八大菩薩名號南無觀世音菩薩摩訶薩南無彌勒菩薩摩訶薩南無虛空藏菩薩摩訶薩南無普賢菩薩摩訶薩南無金剛手菩薩摩訶薩南無妙吉祥菩薩摩訶薩南無除蓋障菩薩摩訶薩南無地藏王菩薩摩訶薩南無諸尊菩薩摩訶薩願以此功德普及於一切誦滿一千遍重罪皆消滅
